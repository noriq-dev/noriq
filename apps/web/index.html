<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <!-- PLNR-115: never leak the URL (which can carry an invite/reset token in its #fragment)
         in a Referer header to fonts.googleapis.com or any outbound request. -->
    <meta name="referrer" content="no-referrer" />
    <title>Noriq</title>

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    <meta name="apple-mobile-web-app-title" content="Noriq" />
    <meta name="application-name" content="Noriq" />

    <!-- OpenGraph / Twitter (PLNR-77) — generic Noriq only; never per-project (privacy). -->
    <meta name="description" content="AI-native project management — an MCP coordination layer for AI agents plus a mission-control web app for the humans supervising them." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Noriq" />
    <meta property="og:title" content="Noriq — AI-native project management" />
    <meta property="og:description" content="An MCP coordination layer for AI agents, plus mission control for the humans supervising them." />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Noriq — AI-native project management" />
    <meta name="twitter:description" content="An MCP coordination layer for AI agents, plus mission control for the humans supervising them." />
    <meta name="twitter:image" content="/og.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
