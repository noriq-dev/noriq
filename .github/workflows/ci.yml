# PLNR-22: quality gate for contributors. Runs the test suite + typecheck on every
# PR (and pushes to main). No secrets, no deploy — Noriq is self-hosted, so each
# operator runs their own `wrangler deploy`. This only stops regressions from merging.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # @noriq-dev/shared is consumed as source (no build output), so nothing to
      # build here — typecheck resolves it straight from packages/shared/src.
      - name: Typecheck
        run: npm run typecheck

      # apps/api's vitest runs on the workerd pool (real Durable Objects + D1 migrations).
      - name: Test
        run: npm run test
